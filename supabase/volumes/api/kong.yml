_format_version: "1.1"

###############################################################################
# Services & Routes
###############################################################################

services:
  ## GoTrue — Auth
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - service_role

  ## PostgREST — REST API
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - anon
            - service_role
      - name: request-transformer
        config:
          add:
            headers:
              - Authorization:Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjIxNDE3MzgwLCJleHAiOjQ3NzcwOTEzODB9.gcEFAhIbNXkFGjfZKH1PD5S26wA4kJdV3kMm6M0rp_E

  ## pg-meta — DB introspection (Studio)
  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - service_role

###############################################################################
# Consumers & Keys
###############################################################################

consumers:
  - username: anon
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlhdCI6MTYyMTQxNzM4MCwiZXhwIjo0Nzc3MDkxMzgwfQ.K5kqIqpxnIU5bkQVqDXiHbY5-HCWvTZ3Gjc6Vq7pJrs
    acls:
      - group: anon

  - username: service_role
    keyauth_credentials:
      - key: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaWF0IjoxNjIxNDE3MzgwLCJleHAiOjQ3NzcwOTEzODB9.gcEFAhIbNXkFGjfZKH1PD5S26wA4kJdV3kMm6M0rp_E
    acls:
      - group: service_role

###############################################################################
# Plugins (global)
###############################################################################

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:5173
        - http://localhost:54323
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - Accept
        - Accept-Version
        - Content-Length
        - Content-MD5
        - Content-Type
        - Date
        - X-Auth-Token
        - Authorization
        - apikey
        - X-Client-Info
        - Prefer
      exposed_headers:
        - X-Auth-Token
        - Content-Range
      credentials: true
      max_age: 3600
