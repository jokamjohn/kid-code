# Supabase CLI local dev config
# Run `supabase start` as an alternative to docker-compose for the Supabase stack.
# Requires: brew install supabase/tap/supabase

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = ""

[inbucket]
enabled = false
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173", "http://localhost:5173/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = false
# Disable email confirmations in local dev — sign up works without SMTP
enable_confirmations = false

[auth.sms]
enable_signup = false

[auth.external.github]
enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false

[experimental]
webhooks_enabled = false
